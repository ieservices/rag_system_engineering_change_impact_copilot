# =============================================================================
# Mode 3: Only PostgreSQL in Docker/Podman (Frontend + Backend local)
# =============================================================================
# Usage:
#   podman-compose -f docker-compose.db.yml up -d
#   cd backend && source .venv/bin/activate && uvicorn app.main:app --reload
#   cd frontend && npm run dev
#
# Access:
#   Frontend: http://localhost:5173 (Vite dev server with HMR)
#   Backend API: http://localhost:8000
#   API Docs: http://localhost:8000/docs
#
# Note: For local backend, use DATABASE_URL=postgresql://postgres:postgres@localhost:5433/impact_copilot
# =============================================================================

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: impact-copilot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: impact_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
