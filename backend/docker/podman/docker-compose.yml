# Podman-compatible docker-compose file for backend service
# Usage: podman-compose -f backend/docker/podman/docker-compose.yml up -d
#
# Note: You need to install podman-compose first:
#   pip install podman-compose
#
# Or use Podman Desktop which includes compose support

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: impact-copilot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: impact_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ../../../backend
      dockerfile: Dockerfile
    container_name: impact-copilot-backend
    env_file:
      - ../../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/impact_copilot
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4-turbo-preview}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://vllm:8000/v1}
      VLLM_MODEL: ${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.2}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../../data:/app/data:Z
    restart: unless-stopped

volumes:
  postgres_data:
