# =============================================================================
# Mode 1: All services in Docker/Podman (Production-like)
# =============================================================================
# Usage:
#   podman-compose up -d
#   docker-compose up -d
#
# Access:
#   Frontend: http://localhost:80
#   Backend API: http://localhost:8000
#   API Docs: http://localhost:8000/docs
# =============================================================================

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: impact-copilot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: impact_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: impact-copilot-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/impact_copilot
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data:Z
    restart: unless-stopped

  # Vue.js Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: impact-copilot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
